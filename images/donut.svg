<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Donut -->
  <!-- Outer circle (donut) -->
  <circle cx="100" cy="100" r="60" fill="#d4957a"/>

  <!-- Inner hole -->
  <circle cx="100" cy="100" r="35" fill="#f4d4c5"/>

  <!-- Glaze shine -->
  <ellipse cx="80" cy="75" rx="25" ry="20" fill="#e8b4d4" opacity="0.6"/>

  <!-- Sprinkles -->
  <line x1="70" y1="50" x2="65" y2="40" stroke="#d4786a" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="45" x2="105" y2="35" stroke="#a8c686" stroke-width="2" stroke-linecap="round"/>
  <line x1="130" y1="50" x2="135" y2="40" stroke="#d4786a" stroke-width="2" stroke-linecap="round"/>
  <line x1="150" y1="70" x2="160" y2="65" stroke="#a8c686" stroke-width="2" stroke-linecap="round"/>
  <line x1="155" y1="100" x2="170" y2="105" stroke="#d4786a" stroke-width="2" stroke-linecap="round"/>
  <line x1="150" y1="130" x2="160" y2="140" stroke="#a8c686" stroke-width="2" stroke-linecap="round"/>
</svg>