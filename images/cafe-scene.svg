<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Cafe Background Illustration -->
  <!-- Sky -->
  <rect width="200" height="100" fill="#87ceeb"/>

  <!-- Building/Cafe -->
  <rect x="40" y="80" width="120" height="100" fill="#d4957a" stroke="#8b6f47" stroke-width="2"/>

  <!-- Roof -->
  <polygon points="40,80 100,30 160,80" fill="#8b6f47"/>

  <!-- Door -->
  <rect x="85" y="130" width="30" height="50" fill="#5a3a32" stroke="#8b6f47" stroke-width="2"/>

  <!-- Door handle -->
  <circle cx="112" cy="160" r="2" fill="#d4957a"/>

  <!-- Window 1 -->
  <rect x="55" y="95" width="25" height="25" fill="#e8d4c4" stroke="#8b6f47" stroke-width="1"/>
  <line x1="67.5" y1="95" x2="67.5" y2="120" stroke="#8b6f47" stroke-width="0.5"/>
  <line x1="55" y1="107.5" x2="80" y2="107.5" stroke="#8b6f47" stroke-width="0.5"/>

  <!-- Window 2 -->
  <rect x="120" y="95" width="25" height="25" fill="#e8d4c4" stroke="#8b6f47" stroke-width="1"/>
  <line x1="132.5" y1="95" x2="132.5" y2="120" stroke="#8b6f47" stroke-width="0.5"/>
  <line x1="120" y1="107.5" x2="145" y2="107.5" stroke="#8b6f47" stroke-width="0.5"/>

  <!-- Sign -->
  <rect x="30" y="50" width="40" height="20" fill="#d4957a" stroke="#8b6f47" stroke-width="1.5" rx="3"/>
  <text x="50" y="63" font-family="Georgia, serif" font-size="10" text-anchor="middle" fill="#fef9f3" font-weight="bold">Cafe</text>

  <!-- Flag on sign post -->
  <line x1="48" y1="50" x2="48" y2="40" stroke="#8b6f47" stroke-width="1"/>
</svg>