<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Cappuccino -->
  <!-- Cup body -->
  <rect x="50" y="80" width="100" height="70" rx="3" fill="none" stroke="#8b6f47" stroke-width="3"/>

  <!-- Cup handle -->
  <path d="M 150 95 Q 175 95 175 115 Q 175 135 150 135" fill="none" stroke="#8b6f47" stroke-width="3"/>

  <!-- Espresso (dark coffee) -->
  <rect x="55" y="105" width="90" height="40" fill="#4a2c1f"/>

  <!-- Steamed milk (white foam) -->
  <rect x="55" y="85" width="90" height="20" rx="2" fill="#f5e6d3"/>

  <!-- Foam bubbles -->
  <circle cx="70" cy="93" r="3" fill="#e8d4c4"/>
  <circle cx="95" cy="90" r="2.5" fill="#e8d4c4"/>
  <circle cx="120" cy="94" r="3" fill="#e8d4c4"/>
  <circle cx="135" cy="91" r="2" fill="#e8d4c4"/>

  <!-- Saucer -->
  <ellipse cx="100" cy="160" rx="60" ry="18" fill="none" stroke="#8b6f47" stroke-width="2"/>

  <!-- Cinnamon on foam -->
  <line x1="60" y1="92" x2="140" y2="97" stroke="#a0683a" stroke-width="0.5" opacity="0.6"/>
  <line x1="65" y1="91" x2="130" y2="95" stroke="#a0683a" stroke-width="0.5" opacity="0.6"/>
</svg>