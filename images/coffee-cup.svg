<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Coffee Cup -->
  <rect x="50" y="60" width="100" height="80" rx="5" fill="none" stroke="#8b6f47" stroke-width="3"/>

  <!-- Cup Handle -->
  <path d="M 150 80 Q 180 80 180 100 Q 180 120 150 120" fill="none" stroke="#8b6f47" stroke-width="3"/>

  <!-- Coffee inside -->
  <rect x="55" y="65" width="90" height="70" rx="3" fill="#6a4423"/>

  <!-- Coffee foam -->
  <ellipse cx="100" cy="65" rx="45" ry="8" fill="#f4d4c5"/>

  <!-- Saucer -->
  <ellipse cx="100" cy="155" rx="55" ry="15" fill="none" stroke="#8b6f47" stroke-width="2"/>

  <!-- Decorative line -->
  <line x1="60" y1="100" x2="140" y2="100" stroke="#d4957a" stroke-width="1" opacity="0.5"/>
</svg>