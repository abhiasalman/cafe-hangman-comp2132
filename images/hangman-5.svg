<svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="300" height="400" fill="#f4d4c5"/>

  <!-- Hangman stand -->
  <line x1="50" y1="350" x2="250" y2="350" stroke="#8b6f47" stroke-width="8"/>
  <line x1="100" y1="350" x2="100" y2="50" stroke="#8b6f47" stroke-width="8"/>
  <line x1="100" y1="50" x2="200" y2="50" stroke="#8b6f47" stroke-width="6"/>
  <line x1="200" y1="50" x2="200" y2="100" stroke="#8b6f47" stroke-width="4"/>

  <!-- Rope -->
  <line x1="200" y1="100" x2="200" y2="140" stroke="#333" stroke-width="2"/>

  <!-- Head -->
  <circle cx="200" cy="160" r="20" stroke="#333" stroke-width="2" fill="none"/>

  <!-- Body -->
  <line x1="200" y1="180" x2="200" y2="250" stroke="#333" stroke-width="2"/>

  <!-- Left Arm -->
  <line x1="200" y1="200" x2="160" y2="220" stroke="#333" stroke-width="2"/>

  <!-- Right Arm -->
  <line x1="200" y1="200" x2="240" y2="220" stroke="#333" stroke-width="2"/>

  <!-- Left Leg -->
  <line x1="200" y1="250" x2="170" y2="300" stroke="#333" stroke-width="2"/>

  <!-- Incorrect guesses indicator -->
  <text x="150" y="30" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#d4786a" font-weight="bold">
    5 Incorrect Guesses
  </text>
</svg>